<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Ordering App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .start-screen h1 {
            color: white;
            font-size: 50px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 1;
            border: 3px solid white;
            padding: 20px 40px;
            border-radius: 10px;
        }
        .start-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://www.aics.nsw.edu.au/wp-content/uploads/2015/11/Canteen-1024x683.jpg') center/cover;
            text-align: center;
        }

        .start-button {
            padding: 20px 40px;
            font-size: 35px;
            background-color: #ac2525;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 90%;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .start-button:hover {
            background-color: #871010;
        }

        .menu-screen {
            display: none;
            padding: 20px;
            padding-bottom: 0px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-screen.active {
            display: block;
            padding-bottom: 120px;
        }

        .back-button {
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-btn {
        position: relative;
        height: 160px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background-size: cover;
        background-position: center;
        overflow: hidden;
        transition: transform 0.3s;
        }
        
        .category-btn:hover {
        transform: scale(1.03);
        }
        
        .category-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
        }

        .category-btn span {
        position: relative;
        z-index: 1;
        color: white;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .menu-items {
            display: none;

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 90%;
            max-width: 700px;
            max-height: 80vh;

            overflow-y: auto;

            background-color: white;
            padding: 25px;
            border-radius: 15px;

            box-shadow: 0 8px 25px rgba(0,0,0,0.3);

            z-index: 1000;
        }
        .menu-items.active {
            display: block;
        }
        .menu-items h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .overlay {
            display: none;

            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.5);

            z-index: 999;
        }

        .overlay.active {
            display: block;
        }
            
        .items {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .item {
            display: flex;
            flex-direction: column;

            background: #fff;
            border-radius: 12px;

            overflow: visible;

            margin-bottom: 20px;
            padding-bottom: 15px;

            border: 1px solid #eee;

            position: relative;
            
        }
        
        .item:last-child {
            border-bottom: none;
        }

        .item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .item-content {
            padding: 15px;
        }

        .quantity-popup {
            display: none;
            position: fixed;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 320px;
            max-width: 90vw;

            background: white;

            padding: 30px;

            border: 4px solid #ac2525;   /* NEW BORDER */
            border-radius: 18px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.4);

            z-index: 9999;

            text-align: center;
        }

        .quantity-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;

            margin-top: 15px;
            margin-bottom: 15px;
        }

        .quantity-text {
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-price {
            font-weight: bold;
            color: #ff6b6b;
            margin: 0 15px;
        }

        .item-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .add-btn {
            padding: 5px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .add-btn:hover {
            background-color: #0b7dda;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .popup-btn {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .confirm-btn {
            background-color: #4CAF50;
        }

        .confirm-btn:hover {
            background-color: #45a049;
        }

        .cancel-btn {
            background-color: #d9534f;
        }

        .cancel-btn:hover {
            background-color: #c9302c;
        }

        .qty-btn {
            width: 32px;
            height: 32px;

            border: none;
            border-radius: 50%;

            background-color: #2196F3;
            color: white;

            font-size: 20px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .qty-btn:hover {
            background-color: #0b7dda;
            transform: scale(1.1);
        }

        .qty-number {
            font-size: 18px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            background-color: white;
            border-top: 3px solid #ac2525;

            padding: 15px 20px;

            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            
            z-index: 100;;
        }
        .cart-total {
            background-color: #ac2525;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
        }
        .checkout-actions {
            display: none;
            gap: 15px;
        }

        
/* Bounce animation */
        @keyframes bounce {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.25);
            }

            50% {
                transform: scale(0.95);
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        } 

        .cart-total.bounce {
            animation: bounce 0.4s;
        }

        .cart-total.active {
            display: block;
        }
        
        .cart-indicator {
            background-color: #ac2525;
            color: white;

            padding: 12px 18px;
            border-radius: 50px;

            font-size: 20px;
            font-weight: bold;

            display: flex;
            align-items: center;
            gap: 10px;

            margin-left: 15px;

            box-shadow: 0 2px 6px rgba(0,0,0,0.2);

            transition: transform 0.2s;
        }

        .cart-indicator.bump {
            transform: scale(1.15);
        }

        .checkout-screen {
            display: none;
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .checkout-screen.active {
            display: block;
        }
        
        .checkout-screen h2 {
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .remove-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background-color: #c9302c;
        }

        .checkout-total {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: right;
        }

        .checkout-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 15px;
        }

        .checkout-btn:hover {
            background-color: #45a049;
        }
        
        .checkout-actions button {
            padding: 18px 40px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            min-width: 240px;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .checkout-actions button:hover {
            transform: scale(1.05);
            opacity: 0.95;
        }

        .keep-ordering-btn {
            background-color: #2196F3;
        }
        .keep-ordering-btn:hover {
            background-color: #0b7dda;
        }
        .confirm-order-btn {
            background-color: #4CAF50;
        }
        .confirm-order-btn:hover {
            background-color: #45a049;
        }
        .payment-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;

            justify-content: center;
            align-items: center;

            z-index: 10000;
        }

        #inactivePopup {
            z-index: 10001;
        }

        .payment-box {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 350px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .payment-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .payment-btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;

            border: none;
            border-radius: 8px;

            color: white;
            font-size: 18px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .card-btn {
            background-color: #2196F3;
        }

        .card-btn:hover {
            background-color: #0b7dda;
        }

        .counter-btn {
            background-color: #4CAF50;
        }

        .counter-btn:hover {
            background-color: #45a049;
        }

        .popup-back-btn {
            background-color: #333;
            color: white;

            border: none;
            border-radius: 6px;

            padding: 10px 18px;
            margin-bottom: 20px;

            cursor: pointer;
            font-size: 16px;

            transition: background-color 0.3s;
        }

        .popup-back-btn:hover {
            background-color: #111;
        }

        .empty-cart-box {
            background-color: white;
            padding: 35px;
            border-radius: 12px;
            text-align: center;
            width: 350px;

            border: 3px solid #d9534f;

            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .empty-cart-box h2 {
            color: #d9534f;
            margin-bottom: 15px;
        }

        .empty-cart-box p {
            font-size: 18px;
            margin-bottom: 25px;
            color: #333;
        }

        .empty-cart-btn {
            background-color: #2196F3;
            color: white;

            border: none;
            border-radius: 8px;

            padding: 12px 25px;

            font-size: 18px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .empty-cart-btn:hover {
            background-color: #0b7dda;
        }

        .searchContainer {
            width: 100%;
            padding: 15px 20px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        #searchBar {
            width: 100%;
            padding: 14px 18px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid #ddd;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }

        #searchBar:focus {
            border-color: #4CAF50;
        }

    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>Canteen Ordering System</h1>
        <button class="start-button" onclick="startOrdering()">Press to start ordering</button>
    </div>

    <div class="menu-screen" id="menuScreen">
        <button class="back-button" onclick="backToStart()">← Back</button>
    
        <div class="bottom-bar">
            <!-- Normal menu buttons -->
            <div id="menuButtons" style="display: flex; align-items: center;">
                
                <button class="checkout-btn" onclick="showCheckout()">
                    Checkout
                </button>
                
                <div class="cart-total" id="cartTotal">
                    Total: $0.00
                </div>
            
            <div class="cart-indicator">
                🛒 <span id="cartCount">0</span>
            </div>

        </div>

            <!-- Checkout page buttons -->
            <div class="checkout-actions" id="checkoutActions">

                <button class="keep-ordering-btn" onclick="keepOrdering()">
                    Keep Ordering
                </button>

                <button class="confirm-order-btn" onclick="confirmOrder()">
                    Confirm Order
                </button>

            </div> <!-- closes checkoutActions -->
        </div> <!-- closes bottom-bar -->

        <div class="searchContainer" id="searchContainer">

            <input 
                type="text"
                id="searchBar"
                placeholder="Search for food or drinks..."
                onkeyup="searchItems()"
            >

        </div>

        <div class="categories" id="categories"></div>
        <div id="itemsContainer"></div>
        
        <div id="checkoutScreen" class="checkout-screen">    
            <h2>Checkout</h2>

            <div id="cartItems"></div>

            <div class="checkout-total" id="checkoutTotal">
                Total: $0.00
            </div>
        </div>
    
    </div> <!-- closes menuScreen -->

        function toggleQuantity(itemId) {

            const popup =
                document.getElementById(`popup-${itemId}`);

            const overlay =
                $('overlay');

            const allPopups =
                document.querySelectorAll('.quantity-popup');

            // Hide all other popups
            allPopups.forEach(p => {
                if (p !== popup) {
                    p.style.display = 'none';
                }
            });

            // Toggle current popup
            if (popup.style.display === 'block') {

                popup.style.display = 'none';
                overlay.classList.remove('active');

            } else {

                popup.style.display = 'block';
                popup.scrollIntoView({ block: 'center' });
                overlay.classList.add('active');
            }
        }

        function updateCart() {

            document.getElementById('cartTotal').textContent =
                `Total: $${total.toFixed(2)}`;

            document.getElementById('checkoutTotal').textContent =

            document.getElementById('cartCount').textContent =

        function removeItem(index) {

            const item = cart[index];

            if (item.quantity > 1) {

                item.quantity--;

                total -= item.price;

            } else {

                total -= item.price;

                cart.splice(index, 1);
            }

            updateCart();
        }

        function increaseCartQuantity(index) {

            const item = cart[index];

            // STOCK LIMIT
            if (item.quantity >= MAX_STOCK) {

                showStockPopup(
                    `Maximum quantity is ${MAX_STOCK}.`
                );

                return;
            }

            item.quantity++;

            total += item.price;

            updateCart();
        }

        function decreaseCartQuantity(index) {

            const item = cart[index];

            item.quantity--;

            total -= item.price;

            if (item.quantity <= 0) {

                cart.splice(index, 1);
            }

            updateCart();
        }

                    currentOrderNumber = data.orderNumber;

                    orderConfirmed = true;

                    paymentBox.innerHTML = `
                        <h2>Order Confirmed</h2>

                        <p style="
                            font-size:24px;
                            font-weight:bold;
                            margin:20px 0;
                            color:#4CAF50;
                        ">
                            Order #${currentOrderNumber}
                        </p>

                        <p style="
                            font-size:18px;
                            line-height:1.5;
                            margin-bottom:25px;
                            color:#333;
                        ">
                            Please go to the counter and pay for your order
                            for it to be prepared.
                        </p>

                            <button class="payment-btn counter-btn"
                            onclick="resetSystem()">
                            Done
                        </button>
                    `;
                })

                .catch(error => {

                    paymentProcessing = false;

                    console.error("FETCH ERROR:", error);

                });
            }
        }

        function cancelPayment() {

            if (paymentProcessing) {
                return;
            }

            if (orderConfirmed) {

                resetSystem();
                return;

            }

            $('overlay')
                .classList.remove('active');

            hide('paymentPopup');

            // Restore original popup
            document.querySelector('.payment-box').innerHTML = `
                <button class="popup-back-btn"
                    onclick="backToCheckout()">
                    ← Back
                </button>

                <h2>Select Payment Method</h2>

                <button class="payment-btn card-btn"
                    onclick="selectPayment('card')">
                    Card Payment
                </button>

                <button class="payment-btn counter-btn"
                    onclick="selectPayment('counter')">
                    Pay at Counter
                </button>
            `;
        }

        function closeAllPopups() {

            document.querySelectorAll('.quantity-popup')
                .forEach(popup => {
                    popup.style.display = 'none';
                });

            $('overlay')
                .classList.remove('active');
        }

        function confirmItem(itemId) {

            let quantity =
                parseInt(document.getElementById(`qty-${itemId}`).textContent);

            if (quantity <= 0) {
                return;
            }

            // STOCK LIMIT
            if (quantity > MAX_STOCK) {

                showStockPopup(
                    `Maximum quantity is ${MAX_STOCK}.`
                );

                quantity = 10;
            }

            // Find item data
            const selectedItem = itemLookup[itemId];

            if (!selectedItem) return;

            let finalName = selectedItem.name;

            const flavourSelect =
                document.getElementById(`flavour-${itemId}`);

            if (flavourSelect) {

                finalName =
                    `${selectedItem.name} - ${flavourSelect.value}`;
            }

            // Check if item already exists in cart
            const existingItem = cart.find(item => item.id === finalName);            
            
            if (existingItem) {

                if (existingItem.quantity + quantity > MAX_STOCK) {
                    showStockPopup(`Maximum quantity is ${MAX_STOCK}.`);
                    return;
                }

                existingItem.quantity += quantity;

            } else {

                cart.push({
                    id: finalName,
                    name: finalName,
                    price: selectedItem.price,
                    quantity: quantity
                });
            }

            // Update total
            total += selectedItem.price * quantity;

            updateCart();

            // Reset popup quantity
            document.getElementById(`qty-${itemId}`).textContent = 1;

            // Close popup
            document.getElementById(`popup-${itemId}`).style.display = 'none';
        }

        function cancelItem(itemId) {

            document.getElementById(`qty-${itemId}`).textContent = 1;

            document.getElementById(`popup-${itemId}`).style.display = 'none';
        }

        function startInactivityTimer() {

            clearTimeout(inactivityTimer);

            inactivityTimer = setTimeout(() => {

                showInactivePopup();

            }, INACTIVITY_TIME); // what ever time Inacitivy time is set to
        }

        function showInactivePopup() {

             $('overlay').classList.add('active');

            show('inactivePopup', 'flex');

            countdown = 10;

            document.getElementById('countdown').textContent = countdown;

            countdownTimer = setInterval(() => {

                countdown--;

                document.getElementById('countdown').textContent = countdown;

                if (countdown <= 0) {

                    clearInterval(countdownTimer);

                    resetSystem();
                }

            }, 1000);
        }

        function stayActive() {

            hide('inactivePopup');

            $('overlay').classList.remove('active');

            clearInterval(countdownTimer);

            startInactivityTimer();
        }

        function resetSystem() {

            orderConfirmed = false;

            clearTimeout(inactivityTimer);
            clearInterval(countdownTimer);

            document.getElementById('inactivePopup').style.display = 'none';

            // Reset cart
            cart = [];
            total = 0;

            updateCart();

            // Reset quantity displays
            document.querySelectorAll('.qty-number').forEach(qty => {
                qty.textContent = 1;
            });

            // Close popups
            closeMenu();
            closeAllPopups();

            // Hide payment popup
            document.getElementById('paymentPopup').style.display = 'none';

            // Hide inactivity popup
            document.getElementById('inactivePopup').style.display = 'none';

            // Hide empty cart popup
            document.getElementById('emptyCartPopup').style.display = 'none';

            // Remove overlay
            $('overlay').classList.remove('active');

            // Reset checkout screen
            document.getElementById('checkoutScreen')
                .classList.remove('active');

            // Reset buttons
            document.getElementById('menuButtons').style.display = 'flex';
            document.getElementById('checkoutActions').style.display = 'none';

            // Show categories again
            document.getElementById('categories').style.display = 'grid';
            document.getElementById('itemsContainer').style.display = 'block';

            // Rebuild categories
            displayCategories();
            
            // Hide menu
            document.getElementById('menuScreen')
                .classList.remove('active');

            // Show start page
            document.getElementById('startScreen')
                .style.display = 'flex';

            // Restore original payment popup
            document.querySelector('.payment-box').innerHTML = `
                <h2>Select Payment Method</h2>

                <button class="payment-btn card-btn"
                    onclick="selectPayment('card')">
                    Pay with Card
                </button>

                <button class="payment-btn counter-btn"
                    onclick="selectPayment('counter')">
                    Pay at Counter
                </button>
            `;
            show('searchContainer');
        }
        
        // Detect user activity ONLY when ordering screen is open
        ['click', 'mousemove', 'keypress', 'touchstart'].forEach(event => {

            document.addEventListener(event, () => {

                const menuScreen =
                    document.getElementById('menuScreen');

                if (menuScreen.classList.contains('active')) {
                    startInactivityTimer();
                }

            });

        });

        function showStockPopup(message) {

            document.getElementById('stockPopupText').textContent =
                message;

            show('stockPopup', 'flex');
        }

        function closeStockPopup() {

            hide('stockPopup');
        }

        function searchItems() {

            const search =
                document.getElementById('searchBar')
                .value
                .toLowerCase();

            const container =
                document.getElementById('itemsContainer');

            // If search is empty
            if (search.trim() === "") {

                container.innerHTML = "";

                return;
            }

            let matchedItems = [];

            // Search through all categories
            Object.keys(menuData).forEach(category => {

                menuData[category].forEach(item => {

                    const itemName =
                        item.name.toLowerCase();

                    // Search item name
                    if (itemName.includes(search)) {

                        matchedItems.push(item);
                    }

                    // Search flavours
                    if (item.flavours) {

                        item.flavours.forEach(flavour => {

                            if (
                                flavour.toLowerCase()
                                .includes(search)
                            ) {

                                matchedItems.push(item);
                            }
                        });
                    }
                });
            });

            // Remove duplicates
            matchedItems =
                [...new Set(matchedItems)];

            let html = `
                <div class="menu-items active">

                    <button class="popup-back-btn"
                        onclick="closeSearchResults()">
                        ← Back
                    </button>

                    <h2>Search Results</h2>

                    <div class="items">
            `;
                        
            if (matchedItems.length === 0) {

                html += `
                    <p>No matching items found.</p>
                `;

            } else {

                matchedItems.forEach(item => {
                    html += createItemHTML(item);
                });
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            $('overlay')
               .classList.add('active');
        }

    </script>
    
    <div id="paymentPopup"
        class="payment-popup"
        onclick="cancelPayment()">

        <div class="payment-box"
            onclick="event.stopPropagation()">

            <h2>Select Payment Method</h2>

            <button class="payment-btn card-btn"
                onclick="selectPayment('card')">
                Pay with Card
            </button>

            <button class="payment-btn counter-btn"
                onclick="selectPayment('counter')">
                Pay at Counter
            </button>

        </div>

    </div>
    
    <div id="overlay"
         class="overlay"
         onclick="
            closeAllPopups();
            closeMenu();
            closeSearchResults();
            cancelPayment();
         ">
    </div>

    <div id="inactivePopup" class="payment-popup">
        <div class="payment-box">
            <h2>Are you still ordering?</h2>

            <p style="font-size:18px; margin:20px 0;">
                Returning to start page in
                <span id="countdown">10</span> seconds
            </p>

            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="payment-btn cancel-btn"
                    style="width:140px;"
                    onclick="resetSystem()">
                    No
                </button>

                <button class="payment-btn counter-btn"
                    style="width:140px;"
                    onclick="stayActive()">
                    Yes
                </button>
            </div>
        </div>
    </div>
            
    <div id="emptyCartPopup" class="payment-popup">

        <div class="empty-cart-box">

            <h2>Cart Empty</h2>

            <p>
                Your cart is empty.<br>
                Please add items before confirming your order.
            </p>

            <button class="empty-cart-btn"
                onclick="document.getElementById('emptyCartPopup').style.display='none'">
                Okay
            </button>

        </div>

    </div>

    <div id="stockPopup" class="payment-popup">

        <div class="empty-cart-box"
            style="border:3px solid #ff9800;">

            <h2 style="color:#ff9800;">
                Stock Limit Reached
            </h2>

            <p id="stockPopupText">
                Maximum quantity is 10.
            </p>

            <button class="empty-cart-btn"
                onclick="closeStockPopup()">
                Okay
            </button>

        </div>

    </div>
</body>  
</html>
