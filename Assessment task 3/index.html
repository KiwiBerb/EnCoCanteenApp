<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Ordering App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    </style>

</head>

<body>
    <div class="start-screen" id="startScreen">
        <h1>Canteen Ordering System</h1>
        
        <button id="adminBtn">Admin
            <img src="Images/UserIcon.png" alt="Admin">
        </button>

        <button class="start-button" onclick="startOrdering()">
            Press to start ordering
        </button>
    </div>

    

    <div class="menu-screen" id="menuScreen">
        <button class="back-button" onclick="backToStart()">← Back</button>
    
        <div class="bottom-bar">
            <!-- Normal menu buttons -->
            <div id="menuButtons" style="display: flex; align-items: center;">
                
                <button class="checkout-btn" onclick="showCheckout()">
                    Checkout
                </button>
                
                <div class="cart-total" id="cartTotal">
                    Total: $0.00
                </div>
            
            <div class="cart-indicator">
                🛒 <span id="cartCount">0</span>
            </div>

        </div>

            <!-- Checkout page buttons -->
            <div class="checkout-actions" id="checkoutActions">

                <button class="keep-ordering-btn" onclick="keepOrdering()">
                    Keep Ordering
                </button>

                <button class="confirm-order-btn" onclick="confirmOrder()">
                    Confirm Order
                </button>

            </div> <!-- closes checkoutActions -->
        </div> <!-- closes bottom-bar -->

        <div class="searchContainer" id="searchContainer">

            <input 
                type="text"
                id="searchBar"
                placeholder="Search for food or drinks..."
                onkeyup="searchItems()"
            >

        </div>

        <div class="categories" id="categories"></div>
        <div id="itemsContainer"></div>
        
        <div id="checkoutScreen" class="checkout-screen">    
            <h2>Checkout</h2>

            <div id="cartItems"></div>

            <div class="checkout-total" id="checkoutTotal">
                Total: $0.00
            </div>
        </div>
    
    </div> <!-- closes menuScreen -->

    <div id="paymentPopup"
        class="payment-popup"
        onclick="cancelPayment()">

        <div class="payment-box"
            onclick="event.stopPropagation()">

            <h2>Select Payment Method</h2>

            <button class="payment-btn card-btn"
                onclick="selectPayment('card')">
                Pay with Card
            </button>

            <button class="payment-btn counter-btn"
                onclick="selectPayment('counter')">
                Pay at Counter
            </button>

        </div>

    </div>
    
    <div id="overlay"
         class="overlay"
         onclick="
            closeAllPopups();
            closeMenu();
            closeSearchResults();
            cancelPayment();
         ">
    </div>

    <div id="inactivePopup" class="payment-popup">
        <div class="payment-box">
            <h2>Are you still ordering?</h2>

            <p style="font-size:18px; margin:20px 0;">
                Returning to start page in
                <span id="countdown">10</span> seconds
            </p>

            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="payment-btn cancel-btn"
                    style="width:140px;"
                    onclick="resetSystem()">
                    No
                </button>

                <button class="payment-btn counter-btn"
                    style="width:140px;"
                    onclick="stayActive()">
                    Yes
                </button>
            </div>
        </div>
    </div>
            
    <div id="emptyCartPopup" class="payment-popup">

        <div class="empty-cart-box">

            <h2>Cart Empty</h2>

            <p>
                Your cart is empty.<br>
                Please add items before confirming your order.
            </p>

            <button class="empty-cart-btn"
                onclick="document.getElementById('emptyCartPopup').style.display='none'">
                Okay
            </button>

        </div>

    </div>

    <div id="stockPopup" class="payment-popup">

        <div class="empty-cart-box"
            style="border:3px solid #ff9800;">

            <h2 style="color:#ff9800;">
                Stock Limit Reached
            </h2>

            <p id="stockPopupText">
                Maximum quantity is 10.
            </p>

            <button class="empty-cart-btn"
                onclick="closeStockPopup()">
                Okay
            </button>

        </div>

    </div>

    <div id="adminPopup" class="popup">
        <div class="popup-content">
            <h2>Admin Login</h2>
            
            <input
                type="text"
                id="adminUsername"
                placeholder="Username"
            >

            <input
                type="password"
                id="adminPassword"
                placeholder="Password"
            >

            <br><br>

            <button onclick="checkAdminLogin()">
                Confirm
            </button>

            <button onclick="closeAdminPopup()">
                Cancel
            </button>
        </div>
    </div>
<script src="script.js"></script>
</body>  
</html>
